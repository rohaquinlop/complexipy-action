name: Update complexipy version

on:
    repository_dispatch:
        types: [complexipy-release]

permissions:
    contents: write

jobs:
    update:
        runs-on: ubuntu-latest
        if: github.event.client_payload.version
        steps:
            - uses: actions/checkout@v4

            - name: Update version
              run: |
                  VERSION="${{ github.event.client_payload.version }}"
                  MAJOR=$(echo "${VERSION}" | cut -d. -f1)
                  sed -i "s/complexipy==.*/complexipy==${VERSION}/" Dockerfile
                  sed -i "s/@v[0-9]*/@v${MAJOR}/" README.md

            - name: Commit and tag
              run: |
                  VERSION="${{ github.event.client_payload.version }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Dockerfile README.md
                  git commit -m "chore: bump complexipy to ${VERSION}"
                  git tag "v${VERSION}"
                  git push origin main "v${VERSION}"

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ github.event.client_payload.version }}"
                  gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
